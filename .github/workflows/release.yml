name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: solo-ist/calendar-mcp

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/solo-ist/calendar-mcp:${{ steps.version.outputs.version }}
            ```

            ### Claude Desktop configuration

            Add to `~/Library/Application Support/Claude/claude_desktop_config.json`:

            ```json
            {
              "mcpServers": {
                "calendar": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-p", "3000:3000",
                    "-v", "calendar-mcp-data:/home/app/.gcp",
                    "-e", "GOOGLE_CLIENT_ID",
                    "-e", "GOOGLE_CLIENT_SECRET",
                    "ghcr.io/solo-ist/calendar-mcp:${{ steps.version.outputs.version }}"
                  ],
                  "env": {
                    "GOOGLE_CLIENT_ID": "your-client-id",
                    "GOOGLE_CLIENT_SECRET": "your-client-secret"
                  }
                }
              }
            }
            ```

            See the [README](https://github.com/solo-ist/calendar-mcp#docker-recommended) for full setup instructions.
